<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cronograma Capilar</title>

    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <meta name="theme-color" content="#d6cfc7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        :root {
            --bg: #f5f3f1;
            --card: #ffffff;
            --text: #1a1a1a;
            --accent: #d6cfc7;
        }

        body.dark {
            --bg: #1c1c1e;
            --card: #2c2c2e;
            --text: #f2f2f2;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s ease;
        }

        header {
            text-align: center;
            padding: 18px;
            font-weight: 600;
            position: relative;
        }

        .toggle {
            position: absolute;
            right: 16px;
            top: 18px;
            cursor: pointer;
        }

        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
        }

        .stats {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 0 16px;
            font-size: 12px;
            opacity: .6;
            text-align: center;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 16px;
        }

        .day {
            background: var(--card);
            border-radius: 16px;
            padding: 8px;
            min-height: 90px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: .25s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .day:hover {
            transform: scale(1.02);
        }

        .today-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            position: absolute;
            top: 6px;
            right: 6px;
        }

        .tag {
            position: absolute;
            bottom: 6px;
            right: 6px;
            font-size: 14px;
        }

        .product-name {
            position: absolute;
            bottom: 6px;
            left: 6px;
            right: 30px;
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.25);
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
