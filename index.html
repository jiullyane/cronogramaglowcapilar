<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cronograma Capilar</title>

<style>
body{margin:0;font-family:-apple-system;background:#f5f3f1}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:16px}
.day{background:#fff;border-radius:16px;padding:8px;min-height:80px;cursor:pointer}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center}
.modal-content{background:#fff;padding:20px;border-radius:20px;width:90%;max-width:400px}
#preview img{width:60px;margin:4px;border-radius:8px}
</style>
</head>

<body>

<div class="calendar" id="calendar"></div>

<div class="modal" id="modal">
<div class="modal-content">

<h3>Fotos</h3>

<input type="file" id="photo" multiple>
<div id="preview"></div>

<button onclick="openGallery()">Ver galeria</button>

<button onclick="save()">Salvar</button>
<button onclick="closeModal()">Fechar</button>

</div>
</div>

<!-- GALERIA -->
<div id="gallery" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
">

<div id="galleryContent" style="
display:flex;
gap:12px;
overflow-x:auto;
padding:20px;
width:100%;
"></div>

<button onclick="closeGallery()" style="
position:absolute;
top:20px;
right:20px;
background:#fff;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
">
Fechar
</button>

</div>

<script>

const cal=document.getElementById('calendar');
let current=new Date();
let selectedDay;
let tempPhotos=[];

// 🔑 chave
function key(y,m,d){return `${y}-${m}-${d}`}

// 📸 criar item
function createPhotoItem(imgSrc,index){

let container=document.createElement('div');
container.style.position='relative';
container.style.display='inline-block';

let img=document.createElement('img');
img.src=imgSrc;

// ⭐ capa
let star=document.createElement('div');
star.innerHTML='⭐';
star.style.position='absolute';
star.style.bottom='0';
star.style.left='0';
star.style.background='#000';
star.style.color='#fff';
star.style.borderRadius='50%';
star.style.width='18px';
star.style.height='18px';
star.style.fontSize='12px';
star.style.display='flex';
star.style.alignItems='center';
star.style.justifyContent='center';
star.style.cursor='pointer';

star.onclick=()=>{
let selected=tempPhotos[index];
tempPhotos.splice(index,1);
tempPhotos.unshift(selected);
refreshPreview();
};

// ❌ remover
let removeBtn=document.createElement('div');
removeBtn.innerHTML='✕';
removeBtn.style.position='absolute';
removeBtn.style.top='0';
removeBtn.style.right='0';
removeBtn.style.background='#000';
removeBtn.style.color='#fff';
removeBtn.style.borderRadius='50%';
removeBtn.style.width='18px';
removeBtn.style.height='18px';
removeBtn.style.fontSize='12px';
removeBtn.style.display='flex';
removeBtn.style.alignItems='center';
removeBtn.style.justifyContent='center';
removeBtn.style.cursor='pointer';

removeBtn.onclick=()=>{
tempPhotos.splice(index,1);
refreshPreview();
};

// ⬅️
let left=document.createElement('div');
left.innerHTML='⬅️';
left.style.position='absolute';
left.style.bottom='0';
left.style.right='22px';
left.onclick=()=>{
if(index===0)return;
[tempPhotos[index-1],tempPhotos[index]]=[tempPhotos[index],tempPhotos[index-1]];
refreshPreview();
};

// ➡️
let right=document.createElement('div');
right.innerHTML='➡️';
right.style.position='absolute';
right.style.bottom='0';
right.style.right='0';
right.onclick=()=>{
if(index===tempPhotos.length-1)return;
[tempPhotos[index+1],tempPhotos[index]]=[tempPhotos[index],tempPhotos[index+1]];
refreshPreview();
};

container.append(img,star,removeBtn,left,right);
return container;
}

// 🔄 atualizar preview
function refreshPreview(){
preview.innerHTML='';
tempPhotos.forEach((p,i)=>{
preview.appendChild(createPhotoItem(p,i));
});
}

// 📸 adicionar fotos
photo.onchange=e=>{
let files=e.target.files;

for(let i=0;i<files.length;i++){
let r=new FileReader();

r.onload=x=>{
let imgSrc=x.target.result;

if(tempPhotos.includes(imgSrc)) return;

tempPhotos.push(imgSrc);
refreshPreview();
};

r.readAsDataURL(files[i]);
}
};

// 💾 salvar
function save(){
let d=JSON.parse(localStorage.getItem('app')||'{}');
let k=key(current.getFullYear(),current.getMonth(),selectedDay);

d[k]={photo:tempPhotos};

localStorage.setItem('app',JSON.stringify(d));

closeModal();
render();
}

// 📅 render calendário
function render(){
cal.innerHTML='';
let d=JSON.parse(localStorage.getItem('app')||'{}');

let y=current.getFullYear();
let m=current.getMonth();

let last=new Date(y,m+1,0).getDate();

for(let i=1;i<=last;i++){
let el=document.createElement('div');
el.className='day';
el.innerText=i;

let k=key(y,m,i);

if(d[k] && d[k].photo?.length){
el.style.backgroundImage=`url(${d[k].photo[0]})`;
el.style.backgroundSize='cover';
}

el.onclick=()=>{
selectedDay=i;
modal.style.display='flex';
tempPhotos=d[k]?.photo?[...d[k].photo]:[];
refreshPreview();
};

cal.appendChild(el);
}
}

// 🔓 modal
function closeModal(){modal.style.display='none';}

// 🖼️ galeria
function openGallery(){

if(!tempPhotos.length){
alert('Sem fotos nesse dia');
return;
}

galleryContent.innerHTML='';

tempPhotos.forEach(src=>{
let img=document.createElement('img');
img.src=src;
img.style.height='70vh';
img.style.borderRadius='12px';
galleryContent.appendChild(img);
});

gallery.style.display='flex';
}

function closeGallery(){
gallery.style.display='none';
}

// iniciar
render();

</script>

</body>
</html>
