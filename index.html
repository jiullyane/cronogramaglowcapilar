<!DOCTYPE html>
<html lang="pt-br">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cronograma Capilar</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<meta name="theme-color" content="#d6cfc7">

<style>
:root{
--bg:#f5f3f1;
--card:#ffffff;
--text:#1a1a1a;
--accent:#d6cfc7;
}
body{margin:0;font-family:-apple-system;background:var(--bg);color:var(--text);}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:16px;}
.day{background:#fff;border-radius:16px;padding:8px;min-height:90px;cursor:pointer;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;}
.modal-content{background:#fff;padding:20px;border-radius:20px;width:90%;max-width:400px;}
</style>
</head>

<body>

<div class="calendar" id="calendar"></div>

<div class="modal" id="modal">
<div class="modal-content">

<h3>Registrar</h3>

<input type="file" id="photo" multiple>
<div id="preview"></div>

<button onclick="openGallery()">Ver galeria</button> <!-- ✅ PASSO 01 -->

<button onclick="save()">Salvar</button>
<button onclick="closeModal()">Fechar</button>

</div>
</div>

<!-- ✅ PASSO 02 (GALERIA) -->
<div id="gallery" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
">

<div id="galleryContent" style="
display:flex;
gap:12px;
overflow-x:auto;
padding:20px;
width:100%;
"></div>

<button onclick="closeGallery()" style="
position:absolute;
top:20px;
right:20px;
background:#fff;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
">
Fechar
</button>

</div>

<script>

let tempPhotos=[];

// ✅ FUNÇÃO CORRIGIDA
function createPhotoItem(imgSrc, index){

let container=document.createElement('div');
container.style.position='relative';
container.style.display='inline-block';

let img=document.createElement('img');
img.src=imgSrc;
img.style.width='60px';
img.style.margin='4px';
img.style.borderRadius='8px';

// ⭐ CAPA
let star=document.createElement('div');
star.innerHTML='⭐';
star.style.position='absolute';
star.style.bottom='0';
star.style.left='0';
star.style.background='#000';
star.style.color='#fff';
star.style.borderRadius='50%';
star.style.width='18px';
star.style.height='18px';
star.style.fontSize='12px';
star.style.display='flex';
star.style.alignItems='center';
star.style.justifyContent='center';
star.style.cursor='pointer';

star.onclick=()=>{
let selected=tempPhotos[index];
tempPhotos.splice(index,1);
tempPhotos.unshift(selected);
refreshPreview();
};

// ❌ REMOVER
let removeBtn=document.createElement('div');
removeBtn.innerHTML='✕';
removeBtn.style.position='absolute';
removeBtn.style.top='0';
removeBtn.style.right='0';
removeBtn.style.background='#000';
removeBtn.style.color='#fff';
removeBtn.style.borderRadius='50%';
removeBtn.style.width='18px';
removeBtn.style.height='18px';
removeBtn.style.fontSize='12px';
removeBtn.style.display='flex';
removeBtn.style.alignItems='center';
removeBtn.style.justifyContent='center';
removeBtn.style.cursor='pointer';

removeBtn.onclick=()=>{
tempPhotos.splice(index,1);
refreshPreview();
};

// ⬅️
let left=document.createElement('div');
left.innerHTML='⬅️';
left.style.position='absolute';
left.style.bottom='0';
left.style.right='22px';
left.onclick=()=>{
if(index===0)return;
[tempPhotos[index-1], tempPhotos[index]]=[tempPhotos[index], tempPhotos[index-1]];
refreshPreview();
};

// ➡️
let right=document.createElement('div');
right.innerHTML='➡️';
right.style.position='absolute';
right.style.bottom='0';
right.style.right='0';
right.onclick=()=>{
if(index===tempPhotos.length-1)return;
[tempPhotos[index+1], tempPhotos[index]]=[tempPhotos[index], tempPhotos[index+1]];
refreshPreview();
};

container.append(img,star,removeBtn,left,right);
return container;
}

// ✅ CORREÇÃO AQUI (index)
function refreshPreview(){
preview.innerHTML='';
tempPhotos.forEach((p,i)=>{
preview.appendChild(createPhotoItem(p,i));
});
}

// ADD FOTO
photo.onchange=e=>{
let files=e.target.files;

for(let i=0;i<files.length;i++){
let r=new FileReader();

r.onload=x=>{
let imgSrc=x.target.result;

if(tempPhotos.includes(imgSrc)) return;

tempPhotos.push(imgSrc);
refreshPreview();
};

r.readAsDataURL(files[i]);
}
};

function openModal(){
modal.style.display='flex';
}

function closeModal(){
modal.style.display='none';
}

// ✅ PASSO 03
function openGallery(){

if(!tempPhotos || tempPhotos.length === 0){
alert('Sem fotos nesse dia');
return;
}

let gallery=document.getElementById('gallery');
let content=document.getElementById('galleryContent');

content.innerHTML='';

tempPhotos.forEach(src=>{

let img=document.createElement('img');
img.src=src;
img.style.height='70vh';
img.style.borderRadius='12px';

content.appendChild(img);

});

gallery.style.display='flex';
}

function closeGallery(){
document.getElementById('gallery').style.display='none';
}

</script>

</body>
</html>
